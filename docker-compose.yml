# 2026-07-22: ротация docker-логов. Лог api дорос до 12 ГБ и забил диск
# (postgres упал). Лимит: 50 МБ × 3 файла = максимум ~150 МБ на контейнер.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: st-michael-postgres
    logging: *default-logging
    environment:
      POSTGRES_DB: broker_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - st-michael-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: st-michael-redis
    logging: *default-logging
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - st-michael-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: st-michael-api
    logging: *default-logging
    environment:
      # 2026-07-22: без NODE_ENV=production Prisma логирует КАЖДЫЙ SQL-запрос
      # (database.module.ts: verbose при NODE_ENV!=production) — так лог api
      # дорос до 12 ГБ и уронил диск с postgres. Dockerfile.api его не ставит.
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/broker_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      API_PORT: 4000
      WEB_URL: ${WEB_URL:-http://localhost}
      PROFITBASE_API_KEY: ${PROFITBASE_API_KEY:-}
      PROFITBASE_BASE_URL: ${PROFITBASE_BASE_URL:-}
      PROFITBASE_FEED_URL: ${PROFITBASE_FEED_URL:-https://pb7828.profitbase.ru/export/profitbase_xml/2b76e70bcddca7c519166c8a9993b20b?scheme=https}
      AMO_SUBDOMAIN: ${AMO_SUBDOMAIN:-stmichael}
      AMO_BASE_DOMAIN: ${AMO_BASE_DOMAIN:-amocrm.ru}
      # 2026-05-27 v2: api-b.amocrm.ru возвращает 401 даже на валидный токен —
      # amocrm в реальности принимает API только на subdomain.amocrm.ru
      # (хотя JWT.api_domain указывает на api-b, это маркер шарда для
      # внутренней маршрутизации). Возвращаемся на subdomain.amocrm.ru +
      # Mozilla User-Agent (обходит WAF).
      AMO_API_DOMAIN: ${AMO_API_DOMAIN:-stmichael.amocrm.ru}
      AMO_ACCESS_TOKEN: ${AMO_ACCESS_TOKEN:-}
      # 2026-05-29: публичная папка Я.Диска с материалами для брокеров.
      YANDEX_DISK_PUBLIC_KEY: ${YANDEX_DISK_PUBLIC_KEY:-https://disk.yandex.ru/d/8_w-xQ8PR3uz3w}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      BROKER_SHEET_ID: ${BROKER_SHEET_ID:-}
      # 2026-06-26: Dadata Suggestions API — автодополнение ИНН в форме регистрации.
      DADATA_API_KEY: ${DADATA_API_KEY:-}
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - st-michael-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: st-michael-web
    logging: *default-logging
    environment:
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "3000:3000"
    # 2026-06-24: shared volume для disk-snapshot CMS-данных.
    # page.tsx пишет /app/data/cms-snapshot.json после каждого
    # успешного fetch к API. При падении API лендинг отдаёт его
    # вместо захардкоженных DEFAULT_* из JS-бандла.
    volumes:
      - web-data:/app/data
    depends_on:
      - api
    networks:
      - st-michael-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: st-michael-nginx
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - uploads:/usr/share/nginx/files:ro
    depends_on:
      - api
      - web
    networks:
      - st-michael-network
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
  web-data:

networks:
  st-michael-network:
    driver: bridge
