version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: st-michael-postgres
    environment:
      POSTGRES_DB: broker_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - st-michael-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: st-michael-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - st-michael-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: st-michael-api
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/broker_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      API_PORT: 4000
      WEB_URL: ${WEB_URL:-http://localhost}
      PROFITBASE_API_KEY: ${PROFITBASE_API_KEY:-}
      PROFITBASE_BASE_URL: ${PROFITBASE_BASE_URL:-}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - st-michael-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: st-michael-web
    environment:
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - st-michael-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: st-michael-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - st-michael-network
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

networks:
  st-michael-network:
    driver: bridge
