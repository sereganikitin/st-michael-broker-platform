name: Заполнить данные на сервере

# Вручную через GitHub UI: Actions → Заполнить данные на сервере → Run workflow.
# Запускает на проде сидеры/синки данных без SSH-доступа пользователя.
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Что запустить'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - seed-stmichael
          - sync-yandex-disk
          - seed-cooperation-doc
          - cleanup-cooperation-docs
          - refresh-cms-content
          - create-admin
          - sync-amocrm-all
          - seed-commission-policies
          - dry-run-dedup
          - inspect-lead
          - list-broker-leads
          - find-contact-by-phone
          - list-amo-users
          - inspect-contact
          - list-contact-fields
          - inspect-recent-fixations
          - inspect-broker-attachment
          - inspect-amo-webhooks
          - test-smtp-send
      admin_phone:
        description: 'Телефон админа (для task=create-admin), формат +7XXXXXXXXXX'
        required: false
      admin_password:
        description: 'Пароль админа (для task=create-admin), будет скрыт в логах'
        required: false
      admin_name:
        description: 'Имя админа (для task=create-admin)'
        required: false
        default: 'Администратор'
      lead_id:
        description: 'ID лида amoCRM (для task=inspect-lead)'
        required: false
      phone:
        description: 'Телефон контакта (для task=find-contact-by-phone), любой формат'
        required: false
      contact_id:
        description: 'ID контакта amoCRM (для task=inspect-contact)'
        required: false
      email:
        description: 'Email брокера (для task=inspect-broker-attachment, проверка forgot-password)'
        required: false

jobs:
  run:
    name: Run seed task on production
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: SSH and run requested task
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 35m
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            COMPOSE_CMD="docker compose"
            if ! docker compose version &>/dev/null; then COMPOSE_CMD="docker-compose"; fi

            TASK="${{ inputs.task }}"

            if [ "$TASK" = "all" ] || [ "$TASK" = "seed-stmichael" ]; then
              echo "=== seed-from-stmichael (проекты + акции с stmichael.ru) ==="
              $COMPOSE_CMD exec -T api node /app/scripts/seed-from-stmichael.js
            fi

            if [ "$TASK" = "all" ] || [ "$TASK" = "sync-yandex-disk" ]; then
              echo ""
              echo "=== sync-yandex-disk (материалы с Яндекс.Диска) ==="
              $COMPOSE_CMD exec -T api node /app/scripts/sync-yandex-disk.js
            fi

            if [ "$TASK" = "all" ] || [ "$TASK" = "seed-cooperation-doc" ]; then
              echo ""
              echo "=== seed-cooperation-doc (документ 'Как начать сотрудничать') ==="
              $COMPOSE_CMD exec -T api node /app/scripts/seed-cooperation-doc.js
            fi

            if [ "$TASK" = "cleanup-cooperation-docs" ]; then
              echo ""
              echo "=== cleanup-cooperation-docs (удалить неверные документы) ==="
              $COMPOSE_CMD exec -T api node /app/scripts/cleanup-cooperation-docs.js
            fi

            if [ "$TASK" = "refresh-cms-content" ]; then
              echo "=== refresh-cms-content (перезаписать дефолты CMS — ОПАСНО, перетирает админские правки) ==="
              $COMPOSE_CMD exec -T api node /app/scripts/refresh-cms-content.js
            fi

            if [ "$TASK" = "seed-commission-policies" ]; then
              echo "=== seed-commission-policies (начальные политики комиссии Зорге 9) ==="
              $COMPOSE_CMD exec -T api node /app/scripts/seed-commission-policies.js
            fi

            if [ "$TASK" = "dry-run-dedup" ]; then
              echo "=== dry-run-dedup (вывод какие дубликаты будут удалены — БД НЕ МЕНЯЕТСЯ) ==="
              $COMPOSE_CMD exec -T api node /app/scripts/dry-run-dedup.js
            fi

            if [ "$TASK" = "sync-amocrm-all" ]; then
              echo "=== sync-amocrm-all (пересинк всех брокеров с amoCRM) ==="
              $COMPOSE_CMD exec -T api node /app/scripts/sync-amocrm-all.js
            fi

            if [ "$TASK" = "inspect-lead" ]; then
              echo "=== inspect-lead (диагностика custom_fields лида в amoCRM) ==="
              if [ -z "${{ inputs.lead_id }}" ]; then
                echo "ERROR: lead_id обязателен (заполни поле lead_id в workflow form)"
                exit 1
              fi
              $COMPOSE_CMD exec -T -e LEAD_ID="${{ inputs.lead_id }}" api node /app/scripts/inspect-lead.js
            fi

            if [ "$TASK" = "inspect-recent-fixations" ]; then
              echo "=== inspect-recent-fixations (последние 5 Client из БД с amoSyncError) ==="
              $COMPOSE_CMD exec -T -e LIMIT=5 api node /app/scripts/inspect-recent-fixations.js
            fi

            if [ "$TASK" = "inspect-broker-attachment" ]; then
              echo "=== inspect-broker-attachment (диагностика прикрепления брокера или forgot-password) ==="
              if [ -z "${{ inputs.phone }}" ] && [ -z "${{ inputs.email }}" ]; then
                echo "ERROR: укажи phone (для проверки фиксации) ИЛИ email (для проверки forgot-password)"
                exit 1
              fi
              $COMPOSE_CMD exec -T \
                -e PHONE="${{ inputs.phone }}" \
                -e EMAIL="${{ inputs.email }}" \
                api node /app/scripts/inspect-broker-attachment.js
            fi

            if [ "$TASK" = "inspect-amo-webhooks" ]; then
              echo "=== inspect-amo-webhooks (список настроенных webhook'ов в amoCRM) ==="
              $COMPOSE_CMD exec -T api node /app/scripts/inspect-amo-webhooks.js
            fi

            if [ "$TASK" = "test-smtp-send" ]; then
              echo "=== test-smtp-send (реальная отправка тестового SMTP-письма) ==="
              if [ -z "${{ inputs.email }}" ]; then
                echo "ERROR: email обязателен — на этот адрес попробуем отправить тестовое письмо"
                exit 1
              fi
              $COMPOSE_CMD exec -T -e TEST_EMAIL="${{ inputs.email }}" api node /app/scripts/test-smtp-send.js
            fi

            if [ "$TASK" = "list-broker-leads" ]; then
              echo "=== list-broker-leads (список лидов amoCRM по ACTIVE-брокерам) ==="
              $COMPOSE_CMD exec -T api node /app/scripts/list-broker-leads.js
            fi

            if [ "$TASK" = "find-contact-by-phone" ]; then
              echo "=== find-contact-by-phone (поиск контакта в amoCRM по телефону) ==="
              if [ -z "${{ inputs.phone }}" ]; then
                echo "ERROR: phone обязателен"
                exit 1
              fi
              $COMPOSE_CMD exec -T -e PHONE="${{ inputs.phone }}" api node /app/scripts/find-contact-by-phone.js
            fi

            if [ "$TASK" = "list-amo-users" ]; then
              echo "=== list-amo-users (users + catalogs из amoCRM) ==="
              $COMPOSE_CMD exec -T api node /app/scripts/list-amo-users.js
            fi

            if [ "$TASK" = "list-contact-fields" ]; then
              echo "=== list-contact-fields (все custom_fields контактов в amoCRM) ==="
              $COMPOSE_CMD exec -T api node /app/scripts/list-contact-fields.js
            fi

            if [ "$TASK" = "inspect-contact" ]; then
              echo "=== inspect-contact (диагностика custom_fields контакта в amoCRM) ==="
              if [ -z "${{ inputs.contact_id }}" ]; then
                echo "ERROR: contact_id обязателен"
                exit 1
              fi
              $COMPOSE_CMD exec -T -e CONTACT_ID="${{ inputs.contact_id }}" api node /app/scripts/inspect-contact.js
            fi

            if [ "$TASK" = "create-admin" ]; then
              echo "=== create-admin (одноразовое создание ADMIN-аккаунта) ==="
              echo "::add-mask::${{ inputs.admin_password }}"
              $COMPOSE_CMD exec -T \
                -e ADMIN_PHONE="${{ inputs.admin_phone }}" \
                -e ADMIN_PASSWORD="${{ inputs.admin_password }}" \
                -e ADMIN_NAME="${{ inputs.admin_name }}" \
                api node /app/scripts/create-admin.js
            fi

            echo ""
            echo "✓ Задача '$TASK' выполнена"
