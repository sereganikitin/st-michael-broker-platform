name: Report broker tour from amo

# 2026-07-22: отчёт «кто был на брокер-туре» из amoCRM + сопоставление с
# фиксациями в нашей БД. По умолчанию dry-run (ничего не пишет).
# С apply=true записывает broker_tour_visited/broker_tour_date найденным
# брокерам — оживает воронка тур→фиксация→сделка на /admin/analytics.
# В amo не пишет никогда.
#
# Скрипт закидывается в работающий контейнер api через docker cp —
# пересборка образа и деплой не нужны.
#
# Запуск: gh workflow run report-broker-tour-amo.yml [-f apply=true]

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Записать тур-поля в БД (false = только отчёт)'
        required: true
        type: boolean
        default: false

concurrency:
  group: report-broker-tour-amo
  cancel-in-progress: false

jobs:
  report:
    name: Run amo broker-tour report on production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: SSH and run report
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch origin master
            echo "=== Скрипт из origin/master: $(git rev-parse --short origin/master) ==="
            git show origin/master:scripts/report-broker-tour-from-amo.js > /tmp/report-broker-tour-from-amo.js
            docker cp /tmp/report-broker-tour-from-amo.js st-michael-api:/app/scripts/report-broker-tour-from-amo.js
            ARGS=""
            if [ "${{ inputs.apply }}" = "true" ]; then ARGS="--apply"; fi
            docker compose exec -T api node /app/scripts/report-broker-tour-from-amo.js $ARGS
            echo "=== Отчёт завершён ==="
