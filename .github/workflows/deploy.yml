name: Deploy to production

# Триггеры:
# 1) Любой push в master (например после мерджа PR) — авто-деплой
# 2) Ручной запуск с GitHub UI (Actions → Run workflow) — на случай отката или повторного деплоя
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  # Гарантирует, что одновременно идёт не более одного деплоя.
  # Если приходит новый push пока идёт предыдущий — старый отменяется.
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        # 2026-05-27 fix: env-секция обязательна, иначе envs: передаёт пустоту.
        # 2026-06-05: добавлены AMO_CLIENT_ID / AMO_CLIENT_SECRET / AMO_REFRESH_TOKEN —
        # нужны для авто-refresh access_token (см. PR #82).
        env:
          AMO_ACCESS_TOKEN: ${{ secrets.AMO_ACCESS_TOKEN }}
          AMO_CLIENT_ID: ${{ secrets.AMO_CLIENT_ID }}
          AMO_CLIENT_SECRET: ${{ secrets.AMO_CLIENT_SECRET }}
          AMO_REFRESH_TOKEN: ${{ secrets.AMO_REFRESH_TOKEN }}
          MANGO_API_KEY: ${{ secrets.MANGO_API_KEY }}
          MANGO_API_SALT: ${{ secrets.MANGO_API_SALT }}
          MANGO_API_URL: ${{ secrets.MANGO_API_URL }}
          # 2026-06-09: SMTP для welcome-email при регистрации брокера +
          # forgotPassword. mail.stmichael.ru:587 (STARTTLS).
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 75m
          # AMO_* из GH secrets автоматически в .env на сервере.
          # Чтобы обновить токен: gh secret set AMO_* ... + push.
          # ВАЖНО: refresh_token ротируется на каждом использовании.
          # На сервере приоритет у БД (SystemSetting) — деплой пишет в .env
          # как fallback. См. apps/api/src/common/amo-token-bootstrap.service.ts.
          envs: AMO_ACCESS_TOKEN,AMO_CLIENT_ID,AMO_CLIENT_SECRET,AMO_REFRESH_TOKEN,MANGO_API_KEY,MANGO_API_SALT,MANGO_API_URL,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM,SMTP_SECURE
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            echo "=== Bootstrap: подтягиваем свежий master ==="
            # 2026-06-10: фиксируем origin на продакшн-репо sereganikitin.
            # Раньше origin случайно остался на форке mefremov888-ai —
            # из-за этого мерджи в sereganikitin/master НЕ приезжали
            # на сервер (форк не синхронизировался). Workflow упорно
            # показывал success, но код оставался старым.
            CURRENT_URL=$(git remote get-url origin)
            EXPECTED_URL="https://github.com/sereganikitin/st-michael-broker-platform.git"
            if [ "$CURRENT_URL" != "$EXPECTED_URL" ]; then
              echo "    origin был: $CURRENT_URL"
              echo "    меняем на:  $EXPECTED_URL"
              git remote set-url origin "$EXPECTED_URL"
            fi
            git fetch origin master
            git reset --hard origin/master
            echo "    HEAD после reset: $(git log --oneline -1)"
            # Обновляем AMO_* в .env из GH secrets.
            # ВАЖНО: appleboy/ssh-action вставляет exit-code-check между
            # строками — поэтому многострочные awk/script ЛОМАЮТСЯ.
            # Всё запихнуто в одну строку с ; разделителями.
            # 2026-06-05: тот же подход применён к 4 переменным сразу.
            touch .env
            for VAR_NAME in AMO_ACCESS_TOKEN AMO_CLIENT_ID AMO_CLIENT_SECRET AMO_REFRESH_TOKEN MANGO_API_KEY MANGO_API_SALT MANGO_API_URL SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASS SMTP_FROM SMTP_SECURE; do VAR_VALUE=$(printenv "$VAR_NAME" || true); if [ -n "$VAR_VALUE" ]; then echo "=== Update .env: $VAR_NAME ==="; awk -v var="$VAR_NAME" 'BEGIN{skip=0} $0 ~ "^"var"="{skip=1; next} skip && /^[A-Z_][A-Z0-9_]*=/{skip=0} !skip{print}' .env > .env.tmp; mv .env.tmp .env; CLEAN_VAR=$(printf "%s" "$VAR_VALUE" | tr -d '\r\n\t '); echo "${VAR_NAME}=${CLEAN_VAR}" >> .env; echo "    длина из env: ${#VAR_VALUE}, длина clean: ${#CLEAN_VAR}"; fi; done
            echo "    .env строк после обновления: $(wc -l < .env)"
            echo "=== Запуск deploy-update.sh ==="
            bash deploy-update.sh
            echo "=== Деплой завершён успешно ==="
