name: Deploy to production

# Триггеры:
# 1) Любой push в master (например после мерджа PR) — авто-деплой
# 2) Ручной запуск с GitHub UI (Actions → Run workflow) — на случай отката или повторного деплоя
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  # Гарантирует, что одновременно идёт не более одного деплоя.
  # Если приходит новый push пока идёт предыдущий — старый отменяется.
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          # 75m — холодная сборка api-образа на этом сервере занимает 40-50 мин,
          # плюс docker compose up -d ждёт healthcheck'и (~5 мин). 45m не хватало —
          # прошлые два запуска (run #25482483617) падали на этапе "Container Recreate".
          command_timeout: 75m
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            echo "=== Bootstrap: подтягиваем свежий master (на случай если deploy-update.sh ещё нет на сервере) ==="
            git fetch origin master
            git reset --hard origin/master
            echo "=== Запуск deploy-update.sh ==="
            bash deploy-update.sh
            echo "=== Деплой завершён успешно ==="
