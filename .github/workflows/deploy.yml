name: Deploy to production

# Триггеры:
# 1) Любой push в master (например после мерджа PR) — авто-деплой
# 2) Ручной запуск с GitHub UI (Actions → Run workflow) — на случай отката или повторного деплоя
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  # Гарантирует, что одновременно идёт не более одного деплоя.
  # Если приходит новый push пока идёт предыдущий — старый отменяется.
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        # 2026-05-27 fix: env-секция обязательна, иначе envs: передаёт пустоту.
        env:
          AMO_ACCESS_TOKEN: ${{ secrets.AMO_ACCESS_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 75m
          # AMO_ACCESS_TOKEN из GH secrets автоматически в .env на сервере.
          # Чтобы обновить токен: gh secret set AMO_ACCESS_TOKEN ... + push.
          envs: AMO_ACCESS_TOKEN
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            echo "=== Bootstrap: подтягиваем свежий master ==="
            git fetch origin master
            git reset --hard origin/master
            # Обновляем AMO_ACCESS_TOKEN в .env из GH secrets (если задан)
            if [ -n "$AMO_ACCESS_TOKEN" ]; then
              echo "=== Чистим .env от мусора и обновляем AMO_ACCESS_TOKEN ==="
              touch .env
              # awk: пропускает блок от 'AMO_ACCESS_TOKEN=' до следующей
              # валидной KEY=VALUE строки или конца файла. Так удаляются
              # и многострочные токены (когда nano разорвал JWT) и любые
              # «продолжения» предыдущего значения.
              awk '
                /^AMO_ACCESS_TOKEN=/ { skip=1; next }
                skip && /^[A-Z_][A-Z0-9_]*=/ { skip=0 }
                !skip { print }
              ' .env > .env.tmp
              # Дополнительно убираем строки которые НЕ выглядят как ENV
              # (без =, или начинаются не с буквы/_), но оставляем
              # комментарии # и пустые строки.
              grep -E '^[A-Z_][A-Z0-9_]*=|^#|^$' .env.tmp > .env.clean || true
              mv .env.clean .env.tmp
              # Добавляем актуальный токен последней строкой
              echo "AMO_ACCESS_TOKEN=$AMO_ACCESS_TOKEN" >> .env.tmp
              mv .env.tmp .env
              echo "    .env обновлён (длина токена: ${#AMO_ACCESS_TOKEN})"
              echo "    .env строк: $(wc -l < .env)"
            fi
            echo "=== Запуск deploy-update.sh ==="
            bash deploy-update.sh
            echo "=== Деплой завершён успешно ==="
