name: Backfill KC team (Staff/Outsource)

# 2026-07-22: разметка менеджеров КЦ — Штат (6 сотрудников Empire Estate)
# / Аутсорс (остальные MANAGER). Запускать ПОСЛЕ деплоя со схемой kcTeam
# (prisma db push добавит колонку). По умолчанию dry-run.
#
# Запуск: gh workflow run backfill-kc-team.yml [-f apply=true]

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Записать в БД (false = dry-run)'
        required: true
        type: boolean
        default: false

concurrency:
  group: backfill-kc-team
  cancel-in-progress: false

jobs:
  backfill:
    name: Run KC team backfill on production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH and run backfill
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch origin master
            echo "=== Скрипт из origin/master: $(git rev-parse --short origin/master) ==="
            git show origin/master:scripts/backfill-kc-team.js > /tmp/backfill-kc-team.js
            docker cp /tmp/backfill-kc-team.js st-michael-api:/app/scripts/backfill-kc-team.js
            ARGS=""
            if [ "${{ inputs.apply }}" = "true" ]; then ARGS="--apply"; fi
            docker compose exec -T api node /app/scripts/backfill-kc-team.js $ARGS
            echo "=== Backfill завершён ==="
