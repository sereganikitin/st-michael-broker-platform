name: Import TG usernames (no phone)

# 2026-07-23: импорт участников TG-чатов без телефона (только ник).
# phone='tg:<ник>', doNotCall=true, baseSource=tg_*. По умолчанию dry-run.
#
# Запуск: gh workflow run import-tg-usernames.yml [-f apply=true]

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Записать в БД (false = dry-run)'
        required: true
        type: boolean
        default: false

concurrency:
  group: import-tg-usernames
  cancel-in-progress: false

jobs:
  import:
    name: Run TG usernames import on production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: SSH and run import
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch origin master
            echo "=== Скрипт из origin/master: $(git rev-parse --short origin/master) ==="
            git show origin/master:scripts/import-tg-usernames.js > /tmp/import-tg-usernames.js
            git show origin/master:scripts/data/tg-usernames-2026-07-22.json > /tmp/tg-usernames-2026-07-22.json
            docker cp /tmp/import-tg-usernames.js st-michael-api:/app/scripts/import-tg-usernames.js
            docker compose exec -T api mkdir -p /app/scripts/data
            docker cp /tmp/tg-usernames-2026-07-22.json st-michael-api:/app/scripts/data/tg-usernames-2026-07-22.json
            ARGS=""
            if [ "${{ inputs.apply }}" = "true" ]; then ARGS="--apply"; fi
            docker compose exec -T api node /app/scripts/import-tg-usernames.js $ARGS
            echo "=== Импорт завершён ==="
